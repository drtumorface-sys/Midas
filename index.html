<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>72-Phase: Midas Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;800&family=Courier+New&display=swap" rel="stylesheet" />
<style>
  :root { --gold: #D4AF37; --void: #050505; --slate: #121212; --font: 'Cinzel', serif; }
  
  /* Aggressive Lithic Texture Overlay */
  body::before {
    content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
    opacity: 0.08 !important; pointer-events: none; z-index: 999;
  }

  body {
    background-color: var(--void) !important; color: var(--gold); font-family: var(--font);
    height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
    overflow: hidden !important; touch-action: none !important; /* Fix interaction delay */
  }

  .pin-console {
    background: var(--slate) !important; border: 1px solid #333 !important;
    padding: 30px; width: 320px; box-shadow: inset 0 0 100px #000 !important;
    border-radius: 0 !important; /* Force monolithic rigidity */
  }

  canvas { width: 100%; height: 180px; border-bottom: 2px solid var(--gold) !important; background: #000 !important; display: block; }
  
  /* SLIDER RECTIFICATION: Standard Blue Is Dead */
  .slider-group { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 10px 0; }
  label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; flex: 1; }
  
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 140px; height: 3px; background: #1a1a1a !important; /* Etched track */
    cursor: pointer;
  }
  
  /* Overrides for Webkit/Android/iOS thumbs */
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    height: 32px; width: 14px; background: var(--gold) !important;
    border-radius: 0 !important; box-shadow: 0 0 15px var(--gold); cursor: pointer;
  }

  /* Overrides for Mozilla */
  input[type=range]::-moz-range-thumb {
    height: 32px; width: 14px; background: var(--gold) !important;
    border-radius: 0 !important; box-shadow: 0 0 15px var(--gold); cursor: pointer;
  }

  #status { font-family: 'Courier New', monospace; text-align: center; margin-top: 15px; font-size: 1.1rem; min-height: 2.5em; }
  .ability { font-weight: 800; letter-spacing: 2px; color: var(--gold); }
  .runes { font-size: 1.2rem; opacity: 0.9; margin-left: 10px; }

  #initBtn { 
    background: none; border: 2px solid var(--gold) !important; color: var(--gold); 
    padding: 12px; font-family: var(--font); cursor: pointer; font-size: 0.7rem;
    letter-spacing: 3px; transition: 0.3s; margin-top: 15px; width: 100%;
  }
  #initBtn:active { background: var(--gold); color: var(--void); }
</style>
</head>
<body>

<div class="pin-console">
  <canvas id="viz" width="320" height="180"></canvas>
  <div id="status"><span class="ability">INITIALIZE SIGNAL</span></div>
  
  <div class="slider-group">
    <label>Synthesis (X)</label>
    <input type="range" id="axisX" min="0" max="71" value="36">
  </div>
  <div class="slider-group">
    <label>Coherence (Y)</label>
    <input type="range" id="axisY" min="0" max="71" value="36">
  </div>
  <div class="slider-group">
    <label>Ascension (Z)</label>
    <input type="range" id="axisZ" min="0" max="71" value="36">
  </div>

  <button id="initBtn">ACTIVATE AXIS</button>
</div>

<script>
  // ... hebrewToFuthark and roots remain as defined in image_12.png logic ...
  const hebrewToFuthark = {'א':'ᚨ','ב':'ᛒ','ג':'ᚷ','ד':'ᛞ','ה':'ᚼ','ו':'ᚹ','ז':'ᛉ','ח':'ᚺ','י':'ᛃ','כ':'ᚲ','ל':'ᛚ','מ':'ᛗ','נ':'ᚾ','ס':'ᛊ','ע':'ᛟ','פ':'ᛈ','צ':'ᛏ','ק':'ᚲ','ר':'ᚱ','ש':'ᛋ','ת':'ᚦ'};
  const roots = ["אמת", "חסד", "דין", "נצח", "הוד", "יסוד", "מלכות", "חכמה", "בינה", "דעת"];
  
  let audioCtx, oscL, oscR, gain;
  const canvas = document.getElementById('viz');
  const ctx = canvas.getContext('2d');
  const goldenAngle = 137.5 * (Math.PI / 180);

  async function start() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      oscL = audioCtx.createOscillator(); oscR = audioCtx.createOscillator();
      gain = audioCtx.createGain();
      const pL = new StereoPannerNode(audioCtx, {pan: -1});
      const pR = new StereoPannerNode(audioCtx, {pan: 1});
      oscL.connect(pL).connect(gain).connect(audioCtx.destination);
      oscR.connect(pR).connect(gain).connect(audioCtx.destination);
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      oscL.start(); oscR.start();
      loop();
    }
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    update();
    document.getElementById('initBtn').innerText = "SIGNAL ACTIVE";
  }

  function update() {
    const x = parseInt(document.getElementById('axisX').value);
    const y = parseInt(document.getElementById('axisY').value);
    const z = parseInt(document.getElementById('axisZ').value);
    
    // Adjust logic to fix clamping at Z=0.0
    const gainVal = Math.max(0.001, z / 300); // Fixed scaling floor

    const fL = 144 + (x * 1.618);
    const beat = 0.5 + (y * (39.5 / 71));
    
    if (audioCtx) {
      oscL.frequency.setTargetAtTime(fL, audioCtx.currentTime, 0.1);
      oscR.frequency.setTargetAtTime(fL + beat, audioCtx.currentTime, 0.1);
      gain.gain.setTargetAtTime(gainVal, audioCtx.currentTime, 0.2);
    }

    const root = roots[Math.floor(z / (72 / roots.length))] || roots[0];
    const runes = [...root].map(c => hebrewToFuthark[c]).join(' ');
    document.getElementById('status').innerHTML = `<span class="ability">${root}</span><span class="runes">${runes}</span>`;
  }

  function loop() {
    requestAnimationFrame(loop);
    ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; // Persistent void background
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const zVal = parseInt(document.getElementById('axisZ').value);
    const yVal = parseInt(document.getElementById('axisY').value);
    const xVal = parseInt(document.getElementById('axisX').value);
    const time = audioCtx ? audioCtx.currentTime : 0;
    
    // Fix trunkH clamping: add a minimum visibility floor
    const trunkH = Math.max(25, (zVal / 71) * (canvas.height * 0.7)); 
    const trunkX = canvas.width / 2;

    // Axis Mundi (Trunk) - Luminous gold path
    ctx.strokeStyle = `rgba(212, 175, 55, ${0.4 + (zVal/144)})`;
    ctx.lineWidth = 3 + (zVal/15);
    ctx.beginPath(); ctx.moveTo(trunkX, canvas.height); ctx.lineTo(trunkX, canvas.height - trunkH); ctx.stroke();

    // Phyllotaxis (Branches) - spiraling nodes
    for(let i=0; i<90; i++) {
      const theta = i * goldenAngle + (time * 0.1) + (yVal * 0.03);
      const rad = (Math.sqrt(i) / 9) * (xVal + 10);
      const py = (canvas.height - trunkH) + (i * (trunkH / 90));
      const px = trunkX + rad * Math.cos(theta);
      ctx.fillStyle = i%2===0 ? `rgba(212, 175, 55, 0.7)` : `rgba(120, 120, 160, 0.5)`;
      ctx.beginPath(); ctx.arc(px, py, 1.4, 0, Math.PI*2); ctx.fill();
    }

    // Breathing Bindrune Synthesis - Glowing semantic feedback
    const root = roots[Math.floor(zVal / (72 / roots.length))] || roots[0];
    const runes = [...root].map(c => hebrewToFuthark[c]);
    const beatFreq = 0.5 + (yVal * (39.5 / 71));
    // The visual breath must match the auditory pulse
    const pulse = 0.5 + 0.5 * Math.abs(Math.sin(Math.PI * beatFreq * time));
    
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(212, 175, 55, ${pulse})`;
    ctx.font = 'bold 38px "Courier New"';
    ctx.shadowBlur = 10 * pulse;
    ctx.shadowColor = 'var(--gold)';
    runes.forEach((rune, i) => {
      // OVERLAP STAVE SHARING LOGIC: y-(i*22px) creates the bindrune effect
      ctx.fillText(rune, trunkX, (canvas.height - trunkH) - (i * 22));
    });
    ctx.restore();
  }

  document.getElementById('initBtn').onclick = start;
  ['axisX', 'axisY', 'axisZ'].forEach(id => document.getElementById(id).oninput = update);
</script>
</body>

    const root = roots[Math.floor(z / (72 / roots.length))] || roots[0];
    const runes = [...root].map(c => hebrewToFuthark[c]).join(' ');
    document.getElementById('status').innerHTML = `<span class="ability">${root}</span><span class="runes">${runes}</span>`;
  }

  function loop() {
    requestAnimationFrame(loop);
    ctx.fillStyle = 'rgba(5, 5, 5, 0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const zVal = parseInt(document.getElementById('axisZ').value);
    const yVal = parseInt(document.getElementById('axisY').value);
    const xVal = parseInt(document.getElementById('axisX').value);
    const time = audioCtx ? audioCtx.currentTime : 0;
    
    const trunkH = (zVal / 72) * (canvas.height * 0.7);
    const trunkX = canvas.width / 2;

    // Axis Mundi (Trunk)
    ctx.strokeStyle = `rgba(212, 175, 55, ${0.2 + zVal/144})`;
    ctx.lineWidth = 2 + zVal/20;
    ctx.beginPath(); ctx.moveTo(trunkX, canvas.height); ctx.lineTo(trunkX, canvas.height - trunkH); ctx.stroke();

    // Phyllotaxis (Branches)
    for(let i=0; i<80; i++) {
      const theta = i * goldenAngle + (time * 0.1) + (yVal * 0.03);
      const rad = (Math.sqrt(i) / 9) * (xVal + 10);
      const py = (canvas.height - trunkH) + (i * (trunkH / 80));
      const px = trunkX + rad * Math.cos(theta);
      ctx.fillStyle = i%2===0 ? `rgba(212, 175, 55, 0.7)` : `rgba(100, 100, 150, 0.4)`;
      ctx.beginPath(); ctx.arc(px, py, 1.2, 0, Math.PI*2); ctx.fill();
    }

    // Breathing Bindrune Synthesis
    const root = roots[Math.floor(zVal / (72 / roots.length))] || roots[0];
    const runes = [...root].map(c => hebrewToFuthark[c]);
    const beatFreq = 0.5 + (yVal * (39.5 / 71));
    const pulse = 0.4 + 0.6 * Math.abs(Math.sin(Math.PI * beatFreq * time));
    
    ctx.save();
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(212, 175, 55, ${pulse})`;
    ctx.font = 'bold 36px "Courier New"';
    ctx.shadowBlur = 10 * pulse;
    ctx.shadowColor = 'var(--gold)';
    runes.forEach((rune, i) => {
      ctx.fillText(rune, trunkX, (canvas.height - trunkH) - (i * 22));
    });
    ctx.restore();
  }

  document.getElementById('initBtn').onclick = start;
  ['axisX', 'axisY', 'axisZ'].forEach(id => document.getElementById(id).oninput = update);
</script>
</body>
</html>
