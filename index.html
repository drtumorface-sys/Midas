<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>72-Phase Midas Edition</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>72-Phase Midas Edition</h1>
    </header>

    <main>
      <canvas id="yggdrasilCanvas" width="600" height="600"></canvas>

      <div class="sliders">
        <label>
          DAATH-SYNTHESIS (X-Axis)
          <input type="range" id="axisX" min="0" max="71" value="14" />
        </label>

        <label>
          DAATH-COHERENCE (Y-Axis)
          <input type="range" id="axisY" min="0" max="71" value="44" />
        </label>

        <label>
          GOETIA-LIMITATION (Z-Axis)
          <input type="range" id="axisZ" min="0" max="71" value="61" />
        </label>
      </div>

      <div id="bindruneStatus" class="status"></div>

      <button id="initSignalBtn">INITIALIZE SIGNAL</button>
    </main>
  </div>

<script src="app.js"></script>
</body>
</html>
